<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azzurro Luxury Boutique - Portal Gościa</title>
  <!-- Google Fonts: Cormorant Garamond i DM Sans -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    /* Zmienne projektowe - System luksusowego designu Azzurro */
    :root {
      --sand: #f7f3ed;
      --sand2: #ede7dc;
      --ocean: #1a4a5c;
      --ocean2: #2a6a80;
      --wave: #4a9ab5;
      --foam: #d8eef5;
      --gold: #c9a84c;
      --text: #1a2a30;
      --muted: #6a8a98;
      --white: #ffffff;
      --success: #2e7d32;
      --success-bg: #e8f5e9;
      --error: #c0392b;
      --error-bg: #fdecea;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sand);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    /* Wygląd aplikacji - Premium mobile-first i wyśrodkowany kontener na desktopie */
    .app-container {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--sand);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(26, 74, 92, 0.05);
      position: relative;
    }

    @media (min-width: 500px) {
      body {
        padding: 40px 20px;
        background: radial-gradient(circle at top right, var(--foam), var(--sand));
      }
      .app-container {
        min-height: unset;
        height: 850px;
        border-radius: 30px;
        overflow-y: auto;
        border: 1px solid var(--sand2);
        box-shadow: 0 20px 40px rgba(26, 74, 92, 0.12);
      }
      /* Dostosowanie paska przewijania */
      .app-container::-webkit-scrollbar {
        width: 6px;
      }
      .app-container::-webkit-scrollbar-track {
        background: var(--sand);
        border-radius: 30px;
      }
      .app-container::-webkit-scrollbar-thumb {
        background: var(--sand2);
        border-radius: 30px;
      }
    }

    /* ──── PRZEŁĄCZNIK JĘZYKA ──── */
    .lang-switcher {
      display: flex;
      justify-content: flex-end;
      padding: 12px 20px 0;
      gap: 8px;
    }

    .lang-btn {
      background: transparent;
      border: 1.5px solid var(--sand2);
      border-radius: 20px;
      padding: 4px 12px;
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .lang-btn.active {
      background: var(--ocean);
      border-color: var(--ocean);
      color: var(--white);
    }

    .lang-btn:hover:not(.active) {
      border-color: var(--ocean);
      color: var(--ocean);
    }

    /* ──── PANEL LOGOWANIA ──── */
    .login-screen {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 30px 30px 40px;
      flex-grow: 1;
      animation: fadeIn 0.4s ease;
    }

    .brand-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .brand-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 38px;
      font-weight: 300;
      color: var(--ocean);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      line-height: 1.1;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--gold);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-top: 8px;
      font-weight: 500;
    }

    .login-card {
      background: var(--white);
      border-radius: 24px;
      padding: 30px 24px;
      border: 1px solid var(--sand2);
      box-shadow: 0 10px 30px rgba(26, 74, 92, 0.04);
    }

    .login-intro {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.5;
    }

    /* Formularze i pola tekstowe */
    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }

    .input-control {
      width: 100%;
      background: var(--sand);
      border: 1px solid var(--sand2);
      border-radius: 12px;
      padding: 14px 16px;
      font-family: inherit;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: all 0.2s ease;
    }

    .input-control:focus {
      border-color: var(--ocean);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(26, 74, 92, 0.08);
    }

    .input-hint {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
    }

    /* Zaokrąglone przyciski w stylu Apple */
    .btn-apple {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      background: var(--ocean);
      color: var(--white);
      border: none;
      border-radius: 50px;
      padding: 16px 24px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(26, 74, 92, 0.15);
      gap: 10px;
    }

    .btn-apple:hover {
      background: var(--ocean2);
      transform: translateY(-1px);
    }

    .btn-apple:active {
      transform: scale(0.98);
      box-shadow: 0 2px 6px rgba(26, 74, 92, 0.1);
    }

    .btn-apple:disabled {
      background: var(--sand2);
      color: var(--muted);
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .btn-outline {
      background: transparent;
      border: 2.5px solid var(--ocean);
      color: var(--ocean);
      box-shadow: none;
    }

    .btn-outline:hover {
      background: var(--foam);
      color: var(--ocean);
      transform: translateY(-1px);
    }

    /* ──── EKRAN GŁÓWNY (DASHBOARD) ──── */
    .dash-screen {
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      animation: fadeIn 0.4s ease;
    }

    /* Nagłówek z powitaniem */
    .dash-header {
      background: var(--ocean);
      color: var(--white);
      padding: 30px 24px 35px;
      border-bottom-left-radius: 28px;
      border-bottom-right-radius: 28px;
      position: relative;
      overflow: hidden;
    }

    .dash-header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 250px;
      height: 250px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .dash-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .dash-logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      letter-spacing: 0.25em;
      color: var(--gold);
      text-transform: uppercase;
    }

    .logout-link {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .logout-link:hover {
      color: var(--white);
    }

    .dash-welcome {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px;
      font-weight: 300;
      line-height: 1.2;
    }

    .dash-subtitle {
      font-size: 13px;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 6px;
      font-weight: 300;
    }

    .dash-dates-badge {
      display: inline-flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.1);
      padding: 8px 14px;
      border-radius: 12px;
      margin-top: 15px;
      font-size: 12px;
      font-weight: 500;
      border: 1px solid rgba(255, 255, 255, 0.15);
      gap: 6px;
    }

    /* Stepper - postęp procesu */
    .stepper-container {
      padding: 20px;
      background: var(--white);
      border-radius: 20px;
      margin: -15px 20px 20px;
      box-shadow: 0 4px 20px rgba(26, 74, 92, 0.03);
      border: 1px solid var(--sand2);
      z-index: 10;
    }

    .stepper-steps {
      display: flex;
      justify-content: space-between;
      position: relative;
    }

    .stepper-line {
      position: absolute;
      top: 15px;
      left: 0;
      right: 0;
      height: 2px;
      background: var(--sand2);
      z-index: 1;
    }

    .stepper-progress-line {
      position: absolute;
      top: 15px;
      left: 0;
      height: 2px;
      background: var(--gold);
      z-index: 2;
      transition: width 0.4s ease;
      width: 0%;
    }

    .stepper-step {
      display: flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
      width: 25%;
    }

    .step-circle {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      background: var(--white);
      border: 2px solid var(--sand2);
      color: var(--muted);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      transition: all 0.3s ease;
    }

    .stepper-step.active .step-circle {
      border-color: var(--ocean);
      background: var(--ocean);
      color: var(--white);
      box-shadow: 0 0 10px rgba(26, 74, 92, 0.25);
    }

    .stepper-step.completed .step-circle {
      border-color: var(--gold);
      background: var(--gold);
      color: var(--white);
    }

    .step-label {
      font-size: 9px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 6px;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stepper-step.active .step-label {
      color: var(--ocean);
      font-weight: 700;
    }

    .stepper-step.completed .step-label {
      color: var(--gold);
    }

    /* Karta (Podstawowy element UI) */
    .card {
      background: var(--white);
      border-radius: 24px;
      padding: 22px;
      margin: 0 20px 20px;
      border: 1px solid var(--sand2);
      box-shadow: 0 4px 15px rgba(26, 74, 92, 0.015);
      transition: all 0.3s ease;
    }

    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 21px;
      font-weight: 600;
      color: var(--ocean);
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title svg {
      color: var(--gold);
      flex-shrink: 0;
    }

    /* Szczegóły płatności */
    .payment-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--sand);
    }

    .payment-row:last-child {
      border-bottom: none;
    }

    .payment-label {
      display: flex;
      flex-direction: column;
    }

    .payment-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .payment-deadline {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .payment-value-status {
      text-align: right;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }

    .payment-amount {
      font-size: 15px;
      font-weight: 700;
      color: var(--ocean);
    }

    .status-badge {
      font-size: 9px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .status-badge.paid {
      background: var(--success-bg);
      color: var(--success);
    }

    .status-badge.unpaid {
      background: var(--error-bg);
      color: var(--error);
    }

    .payment-progress-bar-container {
      margin-top: 15px;
      background: var(--sand);
      height: 6px;
      border-radius: 3px;
      overflow: hidden;
    }

    .payment-progress-bar-fill {
      background: var(--gold);
      height: 100%;
      width: 0%;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .payment-progress-text {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      margin-top: 6px;
    }

    /* Stan zameldowania i dynamiczny formularz */
    .checkin-info-box {
      border-radius: 16px;
      padding: 16px;
      background: var(--sand);
      border: 1px solid var(--sand2);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 15px;
    }

    .checkin-info-box.warning-box {
      background: var(--error-bg);
      border: 1px solid rgba(192, 57, 43, 0.2);
    }

    .guest-form-card {
      border: 1px solid var(--sand2);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 15px;
      background: var(--sand);
    }

    .guest-form-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      color: var(--ocean);
      margin-bottom: 12px;
      letter-spacing: 0.05em;
      border-bottom: 1px solid var(--sand2);
      padding-bottom: 4px;
    }

    /* Kody dostępowe */
    .codes-container {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .apt-code-card {
      border: 1.5px solid var(--sand2);
      border-radius: 18px;
      padding: 18px;
      background: var(--white);
      transition: border-color 0.3s;
    }

    .apt-code-card.active-card {
      border-color: var(--gold);
      box-shadow: 0 4px 15px rgba(201, 168, 76, 0.1);
    }

    .apt-code-header {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--ocean);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      border-bottom: 1px solid var(--sand);
      padding-bottom: 6px;
    }

    .code-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      padding: 6px 0;
    }

    .code-label {
      font-size: 13px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .code-value {
      font-size: 18px;
      font-weight: 700;
      color: var(--ocean);
      letter-spacing: 0.05em;
      background: var(--sand);
      padding: 4px 10px;
      border-radius: 8px;
      border: 1px dashed var(--gold);
      font-family: monospace;
    }

    .code-instruction {
      font-size: 12px;
      color: var(--text);
      line-height: 1.5;
      margin-top: 10px;
      background: var(--foam);
      padding: 12px;
      border-radius: 10px;
      border-left: 3px solid var(--wave);
    }

    /* Wymeldowanie */
    .checkout-upload-box {
      border: 2px dashed var(--sand2);
      border-radius: 16px;
      padding: 24px 16px;
      text-align: center;
      cursor: pointer;
      background: var(--sand);
      transition: all 0.2s;
      margin-bottom: 15px;
    }

    .checkout-upload-box:hover {
      border-color: var(--wave);
      background: var(--foam);
    }

    .checkout-upload-icon {
      margin-bottom: 10px;
      color: var(--wave);
    }

    .checkout-upload-text {
      font-size: 13px;
      font-weight: 500;
      color: var(--ocean);
    }

    .checkout-upload-subtext {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .selected-file-info {
      font-size: 12px;
      color: var(--success);
      margin-top: 8px;
      font-weight: 500;
      display: none;
      background: var(--success-bg);
      padding: 8px;
      border-radius: 8px;
    }

    /* ──── OGÓLNE KOMPONENTY ──── */
    .success-alert {
      background: var(--success-bg);
      color: var(--success);
      border: 1px solid rgba(46, 125, 50, 0.2);
      border-radius: 16px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .error-alert {
      background: var(--error-bg);
      color: var(--error);
      border: 1px solid rgba(192, 57, 43, 0.2);
      border-radius: 16px;
      padding: 16px;
      font-size: 14px;
      line-height: 1.5;
      display: none;
      align-items: center;
      gap: 10px;
      margin-bottom: 15px;
    }

    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(26, 74, 92, 0.95);
      z-index: 100;
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 30px;
      color: var(--white);
      text-align: center;
      animation: fadeIn 0.2s ease;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 20px;
    }

    .spinner-small {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: var(--white);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }

    .hidden {
      display: none !important;
    }

    /* Animacje */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .card-locked {
      opacity: 0.55;
      pointer-events: none;
      position: relative;
    }

    .card-locked::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(247, 243, 237, 0.1);
      z-index: 2;
      border-radius: 24px;
    }

    /* Styl dla Modala PDF z instrukcją apartamentu */
    .pdf-modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(26, 74, 92, 0.95);
      z-index: 3000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 15px;
      animation: fadeIn 0.2s ease;
    }

    .pdf-modal-content {
      width: 100%;
      max-width: 900px;
      height: 90%;
      background: var(--white);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.3);
    }

    .pdf-modal-header {
      padding: 16px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--sand2);
      background: var(--sand);
    }

    .pdf-modal-body {
      flex-grow: 1;
      width: 100%;
      height: calc(100% - 60px);
      overflow: auto;
      -webkit-overflow-scrolling: touch;
    }

    .pdf-iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="app-container">

    <!-- ──── PRZEŁĄCZNIK JĘZYKA ──── -->
    <div id="lang-switcher-top" class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('pl')">🇵🇱 PL</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>

    <!-- ──── EKRAN LOGOWANIA ──── -->
    <div id="login-section" class="login-screen" style="padding-top: 10px;">
      <div class="brand-section">
        <h1 class="brand-title">Azzurro</h1>
        <p class="brand-subtitle">Luxury Boutique</p>
      </div>

      <div class="login-card">
        <p class="login-intro" id="txt-login-intro"></p>

        <div id="login-error-box" class="error-alert"></div>

        <div class="input-group">
          <label class="input-label" id="lbl-email" for="login-email"></label>
          <input type="email" id="login-email" class="input-control" required>
        </div>

        <div class="input-group">
          <label class="input-label" id="lbl-password" for="login-password"></label>
          <input type="password" id="login-password" class="input-control" required>
          <div class="input-hint" id="txt-password-hint"></div>
        </div>

        <button id="btn-login" class="btn-apple" onclick="handleLogin()">
          <span id="txt-btn-login"></span>
          <div id="login-spinner" class="spinner-small"></div>
        </button>
      </div>
    </div>

    <!-- ──── EKRAN DASHBOARDU ──── -->
    <div id="dash-section" class="dash-screen hidden">
      <!-- Nagłówek powitalny -->
      <div class="dash-header">
        <div class="dash-top">
          <span class="dash-logo-text">Azzurro</span>
          <a href="#" class="logout-link" id="txt-logout" onclick="handleLogout()"></a>
        </div>
        <h2 id="guest-welcome" class="dash-welcome"></h2>
        <p class="dash-subtitle" id="txt-dash-subtitle"></p>
        <div class="dash-dates-badge">
          <!-- Ikona kalendarza -->
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

    // ──── Obsługa logowania ────
    function handleLogin() {
      var email = document.getElementById("login-email").value.trim();
      var password = document.getElementById("login-password").value.trim();
      var errorBox = document.getElementById("login-error-box");

      if (!email || !password) {
        errorBox.textContent = t('loginErrorEmpty');
        errorBox.style.display = "flex";
        return;
      }

      errorBox.style.display = "none";
      document.getElementById("btn-login").disabled = true;
      document.getElementById("login-spinner").style.display = "block";

      // Obsługa w środowisku Google Apps Script
      if (typeof google !== "undefined" && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(response) {
            document.getElementById("btn-login").disabled = false;
            document.getElementById("login-spinner").style.display = "none";

            if (response.success) {
              currentReservation = response.reservation;
              // Ustawiamy język na podstawie danych rezerwacji
              if (currentReservation.lang === 'EN') {
                currentLang = 'en';
                document.querySelectorAll('.lang-btn').forEach(function(btn) {
                  btn.classList.toggle('active', btn.textContent.indexOf('EN') > -1);
                });
                applyTranslations();
              }
              localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
              showDashboard(currentReservation);
            } else {
              errorBox.textContent = response.message || t('loginErrorBad');
              errorBox.style.display = "flex";
            }
          })
          .withFailureHandler(function(err) {
            document.getElementById("btn-login").disabled = false;
            document.getElementById("login-spinner").style.display = "none";
            errorBox.textContent = t('loginErrorConn') + (err.message || err);
            errorBox.style.display = "flex";
          })
          .loginGuest(email, password);

          document.getElementById("login-spinner").style.display = "none";

              email: "test@azzurro.pl",
              fullName: "Anna Nowak",
              depositStatus: "Zapłacono",
              restStatus: "Zapłacono",

    // ──── Wyświetlenie Dashboardu i wczytanie stanu rezerwacji ────
    function showDashboard(res) {
      document.getElementById("login-section").classList.add("hidden");
      document.getElementById("dash-section").classList.remove("hidden");
      applyTranslations();

      // Powitanie i szczegóły
      document.getElementById("guest-welcome").textContent = t('welcomePrefix') + res.fullName + "!";

      var datesStr = formatDateFriendly(res.dateFrom) + " – " + formatDateFriendly(res.dateTo) + " (" + res.nightsCount + " " + t('nights') + ")";
      document.getElementById("stay-dates").textContent = datesStr;

      // Płatności
      document.getElementById("val-deposit-amount").textContent = res.depositAmount + " €";
      document.getElementById("val-rest-amount").textContent = res.restAmount + " €";
      document.getElementById("val-bond-amount").textContent = res.bondAmount + " €";
      document.getElementById("val-payment-deadline").textContent = t('deadlinePrefix') + res.paymentDeadline;

      // Statusy
      setPaymentStatusBadge("badge-deposit-status", res.depositStatus);
      setPaymentStatusBadge("badge-rest-status", res.restStatus);
      setPaymentStatusBadge("badge-bond-status", res.bondStatus);

      // Pasek postępu finansowego
      var total = res.depositAmount + res.restAmount + res.bondAmount;
      var paid = 0;
      var ds = (res.depositStatus || "").toLowerCase();
      var rs = (res.restStatus || "").toLowerCase();
      var bs = (res.bondStatus || "").toLowerCase();
      if (ds === "zapłacono" || ds === "paid") paid += res.depositAmount;
      if (rs === "zapłacono" || rs === "paid") paid += res.restAmount;
      if (bs === "zapłacono" || bs === "paid") paid += res.bondAmount;

      var pct = total > 0 ? Math.round((paid / total) * 100) : 0;
      document.getElementById("payment-bar").style.width = pct + "%";
      document.getElementById("payment-progress-text").textContent = t('progressText') + pct + "% (" + paid + t('progressOf') + total + " €)";

      // Określenie bieżącego kroku logicznego
      refreshProgressStepper(res);
    }

    // ──── Formatowanie daty na przyjazną ────
    function formatDateFriendly(dateStr) {
      if (!dateStr) return "";
      var date = new Date(dateStr + "T00:00:00");
      if (currentLang === 'en') {
        var monthsEn = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return monthsEn[date.getMonth()] + " " + date.getDate() + ", " + date.getFullYear();
      }
      var months = ["Sty","Lut","Mar","Kwi","Maj","Cze","Lip","Sie","Wrz","Paź","Lis","Gru"];
      return date.getDate() + " " + months[date.getMonth()] + " " + date.getFullYear();
    }

    // ──── Ustawienie etykiety statusu płatności ────
    function setPaymentStatusBadge(id, status) {
      var badge = document.getElementById(id);
      var s = (status || "").toLowerCase();
      if (s === "zapłacono" || s === "paid") {
        badge.textContent = t('statusPaid');
        badge.className = "status-badge paid";
      } else {
        badge.textContent = t('statusUnpaid');
        badge.className = "status-badge unpaid";
      }
    }

    // ──── Sprawdzenie czy wszystkie płatności są opłacone ────
    function isFullyPaid(res) {
      var ds = (res.depositStatus || "").toLowerCase();
      var rs = (res.restStatus || "").toLowerCase();
      var bs = (res.bondStatus || "").toLowerCase();
      return (
        (ds === "zapłacono" || ds === "paid") &&
        (rs === "zapłacono" || rs === "paid") &&
        (bs === "zapłacono" || bs === "paid")
      );
    }

    // ──── Odświeżenie steppera i sekcji w zależności od postępu ────
    function refreshProgressStepper(res) {
      var stepPayment = document.getElementById("step-node-payment");
      var stepCheckin = document.getElementById("step-node-checkin");
      var stepCodes = document.getElementById("step-node-codes");
      var stepCheckout = document.getElementById("step-node-checkout");
      var stepperBar = document.getElementById("stepper-bar");

      // Domyślnie czyścimy klasy
      [stepPayment, stepCheckin, stepCodes, stepCheckout].forEach(function(el) {
        el.classList.remove("active", "completed");
      });

      // Obliczanie stanów
      var isPaymentDone = isFullyPaid(res);
      var isCheckinDone = res.isCheckedIn;
      var isCodesRevealed = isPdfOpened;
      var cos = (res.checkOutStatus || "").toLowerCase();
      var isCheckoutDone = (cos === "zakończono" || cos === "welcome_done");

      // Postęp Steppera
      if (isCheckoutDone) {
        stepPayment.classList.add("completed");
        stepCheckin.classList.add("completed");
        stepCodes.classList.add("completed");
        stepCheckout.classList.add("completed");
        stepperBar.style.width = "100%";
      } else if (isCodesRevealed) {
        stepPayment.classList.add("completed");
        stepCheckin.classList.add("completed");
        stepCodes.classList.add("completed");
        stepCheckout.classList.add("active");
        stepperBar.style.width = "75%";
      } else if (isCheckinDone) {
        stepPayment.classList.add("completed");
        stepCheckin.classList.add("completed");
        stepCodes.classList.add("active");
        stepperBar.style.width = "50%";
      } else if (isPaymentDone) {
        stepPayment.classList.add("completed");
        stepCheckin.classList.add("active");
        stepperBar.style.width = "25%";
      } else {
        stepPayment.classList.add("active");
        stepperBar.style.width = "0%";
      }

      // KARTA 1: Check-in logic
      var checkinFormContainer = document.getElementById("checkin-form-container");
      var checkinCompletedAlert = document.getElementById("checkin-completed-alert");
      var checkinBefore48h = document.getElementById("checkin-before-48h");
      var checkinPaymentRequired = document.getElementById("checkin-payment-required");

      checkinFormContainer.classList.add("hidden");
      checkinCompletedAlert.classList.add("hidden");
      checkinBefore48h.classList.add("hidden");
      checkinPaymentRequired.classList.add("hidden");

      if (isCheckinDone) {
        checkinCompletedAlert.classList.remove("hidden");
      } else {
        // Sprawdzamy czy okno 48h jest otwarte
        var arrivalDate = new Date(res.dateFrom + "T00:00:00");
        var now = new Date();
        var checkInOpenTime = new Date(arrivalDate.getTime() - 48 * 60 * 60 * 1000);

        if (now >= checkInOpenTime) {
          if (isPaymentDone) {
            checkinFormContainer.classList.remove("hidden");
            document.getElementById("checkin-people-count").textContent = res.guestsCount;
            generateGuestsFields(res.guestsCount);
          } else {
            // 48h minęło, ale płatności nie są uregulowane — blokujemy check-in
            checkinPaymentRequired.classList.remove("hidden");
          }
        } else {
          checkinBefore48h.classList.remove("hidden");
          document.getElementById("checkin-open-time").textContent = formatDateTimeFull(checkInOpenTime);
        }
      }

      // KARTA 2: Kody dostępu
      var cardCodes = document.getElementById("card-codes");
      var codesPdfSection = document.getElementById("codes-pdf-section");
      var codesPrePdf = document.getElementById("codes-pre-pdf");
      var codesDisplayContainer = document.getElementById("codes-display-container");

      cardCodes.classList.add("card-locked");
      codesPdfSection.classList.add("hidden");
      codesPrePdf.classList.add("hidden");
      codesDisplayContainer.classList.add("hidden");

      if (isCheckinDone) {
        cardCodes.classList.remove("card-locked");
        codesPdfSection.classList.remove("hidden");
        if (isPdfOpened) {
          codesDisplayContainer.classList.remove("hidden");
          displayRoomCodes(res.room);
        } else {
          codesPrePdf.classList.remove("hidden");
        }
      }

      // KARTA 3: Wymeldowanie
      var cardCheckout = document.getElementById("card-checkout");
      var checkoutCompletedAlert = document.getElementById("checkout-completed-alert");
      var checkoutFormContainer = document.getElementById("checkout-form-container");

      cardCheckout.classList.add("card-locked");
      checkoutCompletedAlert.classList.add("hidden");
      checkoutFormContainer.classList.add("hidden");

      if (isCheckinDone && isPdfOpened) {
        cardCheckout.classList.remove("card-locked");
        if (isCheckoutDone) {
          checkoutCompletedAlert.classList.remove("hidden");
        } else {
          checkoutFormContainer.classList.remove("hidden");
        }
      }
    }

    // ──── Formatowanie daty i godziny (pełna) ────
    function formatDateTimeFull(date) {
      if (currentLang === 'en') {
        return date.toLocaleDateString('en-GB', { day: 'numeric', month: 'long', year: 'numeric' }) +
               " at " + date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
      }
      return date.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' }) +
             ", godz. " + date.toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' });
    }

      // Domyślnie wstawiamy imię głównego gościa w polu Gość 1

  <!-- Druga część skryptu -->
  <script>
    function submitCheckInForm() {
      if (!currentReservation) return;

      // Zabezpieczenie po stronie klienta: nie pozwalamy wysłać check-in,
      // jeśli zaliczka, reszta i kaucja nie są opłacone (nawet gdyby ktoś
      // ominął UI i wywołał tę funkcję bezpośrednio).
      if (!isFullyPaid(currentReservation)) {
        alert(currentLang === 'en'
          ? "Check-in is not yet available. Please complete all payments (deposit, remaining balance, and security bond) first."
          : "Zameldowanie nie jest jeszcze dostępne. Najpierw należy uregulować wszystkie płatności (zaliczkę, pozostałą kwotę i kaucję).");
        refreshProgressStepper(currentReservation);
        return;
      }

      var count = currentReservation.guestsCount;
      var guests = [];

      for (var i = 1; i <= count; i++) {
        var name = document.getElementById("guest-name-" + i).value.trim();
        var passport = document.getElementById("guest-passport-" + i).value.trim();
        var dob = document.getElementById("guest-dob-" + i).value;
        var nationality = document.getElementById("guest-nationality-" + i).value.trim();

        if (!name || !passport || !dob || !nationality) {
          alert(t('alertFormEmpty'));
          return;
        }

        guests.push({
          name: name,
          passport: passport,
          dob: dob,
          nationality: nationality
        });
      }

      showOverlay('overlayCheckin');

      if (typeof google !== "undefined" && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(response) {
            hideOverlay();
            if (response.success) {
              currentReservation.isCheckedIn = true;
              localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
              showDashboard(currentReservation);

              // Smooth scroll do sekcji kodów dostępu
              setTimeout(function() {
                document.getElementById("card-codes").scrollIntoView({ behavior: 'smooth' });
              }, 400);
            } else {
              alert("Błąd zameldowania: " + response.message);
            }
          })
          .withFailureHandler(function(err) {
            hideOverlay();
            alert(t('checkinErrorConn') + (err.message || err));
          })
          .submitCheckIn(currentReservation.lp, guests);
      } else {
        // Test offline
        setTimeout(function() {
          hideOverlay();
          currentReservation.isCheckedIn = true;
          localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
          showDashboard(currentReservation);

          setTimeout(function() {
            document.getElementById("card-codes").scrollIntoView({ behavior: 'smooth' });
          }, 400);
        }, 1200);
      }
    }

    // ──── Kliknięcie PDF z instrukcją apartamentu ────
    function handlePdfOpenClick() {
      var modal = document.getElementById("pdf-modal");
      var iframe = document.getElementById("pdf-iframe");

      // Ładujemy właściwy PDF w zależności od języka
      iframe.src = (currentLang === 'en') ? PDF_EN : PDF_PL;
      modal.style.display = "flex";

      // Zapisujemy fakt otwarcia w stanie
      if (!isPdfOpened) {
        isPdfOpened = true;
        localStorage.setItem("azzurro_pdf_opened", "true");

        // Aktualizujemy Dashboard
        refreshProgressStepper(currentReservation);
      }
    }

    // ──── Zamknięcie modala PDF i przewinięcie do kodów ────
    function closePdfModal() {
      var modal = document.getElementById("pdf-modal");
      var iframe = document.getElementById("pdf-iframe");

      modal.style.display = "none";
      iframe.src = "";

      // Scroll do kodów po zamknięciu
      setTimeout(function() {
        var codesEl = document.getElementById("codes-display-container");
        if (codesEl && !codesEl.classList.contains("hidden")) {
          codesEl.scrollIntoView({ behavior: 'smooth' });
        }
      }, 300);
    }

    // ──── Wyświetlenie kodów dostępu dla poszczególnych pokoi ────
    function displayRoomCodes(roomStr) {
      var container = document.getElementById("rooms-codes-list");
      container.innerHTML = "";

      if (!roomStr) return;

      // Szukamy cyfr 1, 2, 3 w ciągu pokoju
      var regex = /[123]/g;
      var match;
      var uniqueRooms = {};

      while ((match = regex.exec(roomStr.toString())) !== null) {
        uniqueRooms[match[0]] = true;
      }

      var roomsFound = Object.keys(uniqueRooms).sort();

      if (roomsFound.length === 0) {
        container.innerHTML = '<p style="font-size: 13px; color: var(--error);">' + t('noRoomsError') + '</p>';
        return;
      }

      roomsFound.forEach(function(roomNum) {
        var details = ROOM_CODES_MAP[roomNum];
        if (!details) return;

        var desc = (currentLang === 'en') ? details.desc_en : details.desc_pl;

        var roomHtml = '<div class="apt-code-card active-card">' +
          '<div class="apt-code-header">' +
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
          '<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>' +
          '<polyline points="9 22 9 12 15 12 15 22"/>' +
          '</svg>' +
          '<span>' + t('apt') + ' ' + roomNum + '</span>' +
          '</div>' +

          '<div class="code-row">' +
          '<div class="code-label"><span>🔑 ' + t('codeEntrance') + '</span></div>' +
          '<div class="code-value">' + details.door + '</div>' +
          '</div>' +

          '<div class="code-row">' +
          '<div class="code-label"><span>🔐 ' + t('codeBox') + '</span></div>' +
          '<div class="code-value">' + details.box + '</div>' +
          '</div>' +

          '<div class="code-instruction">' + desc + '</div>' +
          '</div>';

        container.insertAdjacentHTML('beforeend', roomHtml);
      });
    }

    // ──── Obsługa wyboru wideo check-out ────
    function triggerVideoFileInput() {
      document.getElementById("checkout-video-input").click();
    }

    function handleVideoFileSelection() {
      var fileInput = document.getElementById("checkout-video-input");
      var uploadText = document.getElementById("upload-box-text");
      var fileNameDiv = document.getElementById("selected-file-name");
      var btnSubmit = document.getElementById("btn-submit-checkout");

      if (fileInput.files.length === 0) {
        selectedVideoBase64 = null;
        selectedVideoFilename = null;
        uploadText.textContent = t('uploadBoxText');
        fileNameDiv.style.display = "none";
        btnSubmit.disabled = true;
        return;
      }

      var file = fileInput.files[0];

      // Sprawdzamy rozmiar pliku (maks. 30MB)
      if (file.size > 30 * 1024 * 1024) {
        var sizeMB = (file.size / (1024*1024)).toFixed(1);
        alert(t('fileTooLarge').replace('{SIZE}', sizeMB));
        fileInput.value = "";
        selectedVideoBase64 = null;
        selectedVideoFilename = null;
        uploadText.textContent = t('uploadBoxText');
        fileNameDiv.style.display = "none";
        btnSubmit.disabled = true;
        return;
      }

      uploadText.textContent = t('fileChanged');
      fileNameDiv.textContent = t('fileSelected') + file.name + " (" + (file.size / (1024*1024)).toFixed(2) + " MB)";
      fileNameDiv.style.display = "block";

      // Konwersja do Base64
      var reader = new FileReader();
      reader.onload = function(e) {
        var dataUrl = e.target.result;
        selectedVideoBase64 = dataUrl.split(',')[1];
        selectedVideoFilename = file.name;
        btnSubmit.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    // ──── Wysłanie check-out ────
    function submitCheckOut() {
      if (!currentReservation || !selectedVideoBase64 || !selectedVideoFilename) return;

      showOverlay('overlayCheckout');

      if (typeof google !== "undefined" && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function(response) {
            hideOverlay();
            if (response.success) {
              currentReservation.checkOutStatus = "WELCOME_DONE";
              localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
              showDashboard(currentReservation);
              alert(currentLang === 'en' ? "Check-out completed successfully. Thank you!" : "Wymeldowanie zakończone pomyślnie. Dziękujemy!");
            } else {
              alert("Błąd wymeldowania: " + response.message);
            }
          })
          .withFailureHandler(function(err) {
            hideOverlay();
            alert(t('checkoutErrorConn') + (err.message || err));
          })
          .uploadCheckOutVideo(currentReservation.lp, selectedVideoBase64, selectedVideoFilename);
      } else {
        // Offline test
        setTimeout(function() {
          hideOverlay();
          currentReservation.checkOutStatus = "WELCOME_DONE";
          localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
          showDashboard(currentReservation);
          alert(t('checkoutSuccess'));
        }, 2000);
      }
    }
  </script>
</body>
