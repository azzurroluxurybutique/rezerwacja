<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Azzurro Luxury Boutique - Portal Gościa</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --sand: #f7f3ed;
      --sand2: #ede7dc;
      --ocean: #1a4a5c;
      --ocean2: #2a6a80;
      --wave: #4a9ab5;
      --foam: #d8eef5;
      --gold: #c9a84c;
      --text: #1a2a30;
      --muted: #6a8a98;
      --white: #ffffff;
      --success: #2e7d32;
      --success-bg: #e8f5e9;
      --error: #c0392b;
      --error-bg: #fdecea;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--sand);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      background: var(--sand);
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(26, 74, 92, 0.05);
      position: relative;
    }

    @media (min-width: 500px) {
      body { padding: 40px 20px; background: radial-gradient(circle at top right, var(--foam), var(--sand)); }
      .app-container {
        min-height: unset;
        height: 850px;
        border-radius: 30px;
        overflow-y: auto;
        border: 1px solid var(--sand2);
        box-shadow: 0 20px 40px rgba(26, 74, 92, 0.12);
      }
      .app-container::-webkit-scrollbar { width: 6px; }
      .app-container::-webkit-scrollbar-track { background: var(--sand); border-radius: 30px; }
      .app-container::-webkit-scrollbar-thumb { background: var(--sand2); border-radius: 30px; }
    }

    .lang-switcher { display: flex; justify-content: flex-end; padding: 12px 20px 0; gap: 8px; }
    .lang-btn {
      background: transparent; border: 1.5px solid var(--sand2); border-radius: 20px;
      padding: 4px 12px; font-family: inherit; font-size: 12px; font-weight: 600;
      color: var(--muted); cursor: pointer; transition: all 0.2s;
    }
    .lang-btn.active { background: var(--ocean); border-color: var(--ocean); color: var(--white); }
    .lang-btn:hover:not(.active) { border-color: var(--ocean); color: var(--ocean); }

    .login-screen {
      display: flex; flex-direction: column; justify-content: center;
      padding: 30px 30px 40px; flex-grow: 1; animation: fadeIn 0.4s ease;
    }

    .brand-section { text-align: center; margin-bottom: 40px; }
    .brand-title {
      font-family: 'Cormorant Garamond', serif; font-size: 38px; font-weight: 300;
      color: var(--ocean); letter-spacing: 0.15em; text-transform: uppercase; line-height: 1.1;
    }
    .brand-subtitle { font-size: 12px; color: var(--gold); letter-spacing: 0.3em; text-transform: uppercase; margin-top: 8px; font-weight: 500; }

    .login-card {
      background: var(--white); border-radius: 24px; padding: 30px 24px;
      border: 1px solid var(--sand2); box-shadow: 0 10px 30px rgba(26, 74, 92, 0.04);
    }
    .login-intro { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 24px; line-height: 1.5; }

    .input-group { margin-bottom: 20px; }
    .input-label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 6px; }
    .input-control {
      width: 100%; background: var(--sand); border: 1px solid var(--sand2); border-radius: 12px;
      padding: 14px 16px; font-family: inherit; font-size: 15px; color: var(--text); outline: none; transition: all 0.2s ease;
    }
    .input-control:focus { border-color: var(--ocean); background: var(--white); box-shadow: 0 0 0 3px rgba(26, 74, 92, 0.08); }
    .input-hint { font-size: 11px; color: var(--muted); margin-top: 5px; }

    .btn-apple {
      display: flex; align-items: center; justify-content: center; width: 100%;
      background: var(--ocean); color: var(--white); border: none; border-radius: 50px;
      padding: 16px 24px; font-family: inherit; font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 15px rgba(26, 74, 92, 0.15); gap: 10px;
    }
    .btn-apple:hover { background: var(--ocean2); transform: translateY(-1px); }
    .btn-apple:active { transform: scale(0.98); box-shadow: 0 2px 6px rgba(26, 74, 92, 0.1); }
    .btn-apple:disabled { background: var(--sand2); color: var(--muted); cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-outline { background: transparent; border: 2.5px solid var(--ocean); color: var(--ocean); box-shadow: none; }
    .btn-outline:hover { background: var(--foam); color: var(--ocean); transform: translateY(-1px); }

    .dash-screen { display: flex; flex-direction: column; flex-grow: 1; animation: fadeIn 0.4s ease; }

    .dash-header {
      background: var(--ocean); color: var(--white); padding: 30px 24px 35px;
      border-bottom-left-radius: 28px; border-bottom-right-radius: 28px; position: relative; overflow: hidden;
    }
    .dash-header::after {
      content: ''; position: absolute; top: -50%; right: -50%; width: 250px; height: 250px;
      border-radius: 50%; background: radial-gradient(circle, rgba(201,168,76,0.12) 0%, transparent 70%); pointer-events: none;
    }
    .dash-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .dash-logo-text { font-family: 'Cormorant Garamond', serif; font-size: 18px; letter-spacing: 0.25em; color: var(--gold); text-transform: uppercase; }
    .logout-link { color: rgba(255,255,255,0.6); font-size: 12px; text-decoration: none; font-weight: 500; transition: color 0.2s; }
    .logout-link:hover { color: var(--white); }
    .dash-welcome { font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 300; line-height: 1.2; }
    .dash-subtitle { font-size: 13px; color: rgba(255,255,255,0.7); margin-top: 6px; font-weight: 300; }
    .dash-dates-badge {
      display: inline-flex; align-items: center; background: rgba(255,255,255,0.1);
      padding: 8px 14px; border-radius: 12px; margin-top: 15px; font-size: 12px;
      font-weight: 500; border: 1px solid rgba(255,255,255,0.15); gap: 6px;
    }

    .stepper-container {
      padding: 20px; background: var(--white); border-radius: 20px;
      margin: -15px 20px 20px; box-shadow: 0 4px 20px rgba(26, 74, 92, 0.03);
      border: 1px solid var(--sand2); z-index: 10;
    }
    .stepper-steps { display: flex; justify-content: space-between; position: relative; }
    .stepper-line { position: absolute; top: 15px; left: 0; right: 0; height: 2px; background: var(--sand2); z-index: 1; }
    .stepper-progress-line { position: absolute; top: 15px; left: 0; height: 2px; background: var(--gold); z-index: 2; transition: width 0.4s ease; width: 0%; }
    .stepper-step { display: flex; flex-direction: column; align-items: center; z-index: 3; width: 25%; }
    .step-circle {
      width: 30px; height: 30px; border-radius: 50%; background: var(--white);
      border: 2px solid var(--sand2); color: var(--muted); display: flex;
      align-items: center; justify-content: center; font-size: 11px; font-weight: 700; transition: all 0.3s ease;
    }
    .stepper-step.active .step-circle { border-color: var(--ocean); background: var(--ocean); color: var(--white); box-shadow: 0 0 10px rgba(26, 74, 92, 0.25); }
    .stepper-step.completed .step-circle { border-color: var(--gold); background: var(--gold); color: var(--white); }
    .step-label { font-size: 9px; font-weight: 500; color: var(--muted); margin-top: 6px; text-align: center; text-transform: uppercase; letter-spacing: 0.05em; }
    .stepper-step.active .step-label { color: var(--ocean); font-weight: 700; }
    .stepper-step.completed .step-label { color: var(--gold); }

    .card {
      background: var(--white); border-radius: 24px; padding: 22px; margin: 0 20px 20px;
      border: 1px solid var(--sand2); box-shadow: 0 4px 15px rgba(26, 74, 92, 0.015); transition: all 0.3s ease;
    }
    .card-title { font-family: 'Cormorant Garamond', serif; font-size: 21px; font-weight: 600; color: var(--ocean); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
    .card-title svg { color: var(--gold); flex-shrink: 0; }

    .payment-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--sand); }
    .payment-row:last-child { border-bottom: none; }
    .payment-label { display: flex; flex-direction: column; }
    .payment-name { font-size: 14px; font-weight: 500; color: var(--text); }
    .payment-deadline { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .payment-value-status { text-align: right; display: flex; flex-direction: column; align-items: flex-end; }
    .payment-amount { font-size: 15px; font-weight: 700; color: var(--ocean); }
    .status-badge { font-size: 9px; padding: 3px 8px; border-radius: 20px; font-weight: 600; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.03em; }
    .status-badge.paid { background: var(--success-bg); color: var(--success); }
    .status-badge.unpaid { background: var(--error-bg); color: var(--error); }
    .payment-progress-bar-container { margin-top: 15px; background: var(--sand); height: 6px; border-radius: 3px; overflow: hidden; }
    .payment-progress-bar-fill { background: var(--gold); height: 100%; width: 0%; transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
    .payment-progress-text { font-size: 11px; color: var(--muted); text-align: right; margin-top: 6px; }

    .checkin-info-box { border-radius: 16px; padding: 16px; background: var(--sand); border: 1px solid var(--sand2); font-size: 14px; line-height: 1.5; margin-bottom: 15px; }
    .checkin-info-box.warning-box { background: var(--error-bg); border: 1px solid rgba(192, 57, 43, 0.2); }

    .guest-form-card { border: 1px solid var(--sand2); border-radius: 16px; padding: 16px; margin-bottom: 15px; background: var(--sand); }
    .guest-form-title { font-size: 13px; font-weight: 600; text-transform: uppercase; color: var(--ocean); margin-bottom: 12px; letter-spacing: 0.05em; border-bottom: 1px solid var(--sand2); padding-bottom: 4px; }

    .codes-container { display: flex; flex-direction: column; gap: 15px; }
    .apt-code-card { border: 1.5px solid var(--sand2); border-radius: 18px; padding: 18px; background: var(--white); transition: border-color 0.3s; }
    .apt-code-card.active-card { border-color: var(--gold); box-shadow: 0 4px 15px rgba(201, 168, 76, 0.1); }
    .apt-code-header { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 600; color: var(--ocean); margin-bottom: 12px; display: flex; align-items: center; gap: 6px; border-bottom: 1px solid var(--sand); padding-bottom: 6px; }
    .code-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 6px 0; }
    .code-label { font-size: 13px; color: var(--muted); display: flex; align-items: center; gap: 5px; }
    .code-value { font-size: 18px; font-weight: 700; color: var(--ocean); letter-spacing: 0.05em; background: var(--sand); padding: 4px 10px; border-radius: 8px; border: 1px dashed var(--gold); font-family: monospace; }
    .code-instruction { font-size: 12px; color: var(--text); line-height: 1.5; margin-top: 10px; background: var(--foam); padding: 12px; border-radius: 10px; border-left: 3px solid var(--wave); }

    .checkout-upload-box { border: 2px dashed var(--sand2); border-radius: 16px; padding: 24px 16px; text-align: center; cursor: pointer; background: var(--sand); transition: all 0.2s; margin-bottom: 15px; }
    .checkout-upload-box:hover { border-color: var(--wave); background: var(--foam); }
    .checkout-upload-icon { margin-bottom: 10px; color: var(--wave); }
    .checkout-upload-text { font-size: 13px; font-weight: 500; color: var(--ocean); }
    .checkout-upload-subtext { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .selected-file-info { font-size: 12px; color: var(--success); margin-top: 8px; font-weight: 500; display: none; background: var(--success-bg); padding: 8px; border-radius: 8px; }

    .success-alert { background: var(--success-bg); color: var(--success); border: 1px solid rgba(46, 125, 50, 0.2); border-radius: 16px; padding: 16px; font-size: 14px; line-height: 1.5; display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
    .error-alert { background: var(--error-bg); color: var(--error); border: 1px solid rgba(192, 57, 43, 0.2); border-radius: 16px; padding: 16px; font-size: 14px; line-height: 1.5; display: none; align-items: center; gap: 10px; margin-bottom: 15px; }

    .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(26, 74, 92, 0.95); z-index: 100; display: none; flex-direction: column; justify-content: center; align-items: center; padding: 30px; color: var(--white); text-align: center; animation: fadeIn 0.2s ease; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.3); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 20px; }
    .spinner-small { width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.3); border-top-color: var(--white); border-radius: 50%; animation: spin 0.8s linear infinite; display: none; }

    .hidden { display: none !important; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin { to { transform: rotate(360deg); } }

    .card-locked { opacity: 0.55; pointer-events: none; position: relative; }
    .card-locked::before { content: ''; position: absolute; inset: 0; background: rgba(247, 243, 237, 0.1); z-index: 2; border-radius: 24px; }

    .pdf-modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(26, 74, 92, 0.95); z-index: 3000; display: none; justify-content: center; align-items: center; padding: 15px; animation: fadeIn 0.2s ease; }
    .pdf-modal-content { width: 100%; max-width: 900px; height: 90%; background: var(--white); border-radius: 24px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
    .pdf-modal-header { padding: 16px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--sand2); background: var(--sand); }
    .pdf-modal-body { flex-grow: 1; width: 100%; height: calc(100% - 60px); overflow: auto; -webkit-overflow-scrolling: touch; }
    .pdf-iframe { width: 100%; height: 100%; border: none; }

    /* Baner konfiguracji */
    .config-banner {
      background: #fff3cd; border: 1px solid #ffc107; border-radius: 12px;
      padding: 12px 16px; font-size: 12px; color: #856404; margin: 10px 20px;
      display: none; line-height: 1.5;
    }
    .config-banner code { background: rgba(0,0,0,0.1); padding: 1px 5px; border-radius: 4px; font-family: monospace; }
  </style>
</head>
<body>

  <div class="app-container">

    <!-- ──── PRZEŁĄCZNIK JĘZYKA ──── -->
    <div id="lang-switcher-top" class="lang-switcher">
      <button class="lang-btn active" onclick="setLang('pl')">🇵🇱 PL</button>
      <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
    </div>

    <!-- Baner ostrzeżenia o braku konfiguracji GAS URL -->
    <div id="config-banner" class="config-banner">
      ⚠️ Brak konfiguracji. Ustaw <code>GAS_URL</code> w pliku <code>config.js</code> lub w sekcji skryptu poniżej.
    </div>

    <!-- ──── EKRAN LOGOWANIA ──── -->
    <div id="login-section" class="login-screen" style="padding-top: 10px;">
      <div class="brand-section">
        <h1 class="brand-title">Azzurro</h1>
        <p class="brand-subtitle">Luxury Boutique</p>
      </div>

      <div class="login-card">
        <p class="login-intro" id="txt-login-intro"></p>
        <div id="login-error-box" class="error-alert"></div>

        <div class="input-group">
          <label class="input-label" id="lbl-email" for="login-email"></label>
          <input type="email" id="login-email" class="input-control" required>
        </div>

        <div class="input-group">
          <label class="input-label" id="lbl-password" for="login-password"></label>
          <input type="password" id="login-password" class="input-control" required>
          <div class="input-hint" id="txt-password-hint"></div>
        </div>

        <button id="btn-login" class="btn-apple" onclick="handleLogin()">
          <span id="txt-btn-login"></span>
          <div id="login-spinner" class="spinner-small"></div>
        </button>
      </div>
    </div>

    <!-- ──── EKRAN DASHBOARDU ──── -->
    <div id="dash-section" class="dash-screen hidden">
      <div class="dash-header">
        <div class="dash-top">
          <span class="dash-logo-text">Azzurro</span>
          <a href="#" class="logout-link" id="txt-logout" onclick="handleLogout()"></a>
        </div>
        <h2 id="guest-welcome" class="dash-welcome"></h2>
        <p class="dash-subtitle" id="txt-dash-subtitle"></p>
        <div class="dash-dates-badge">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="stay-dates">... - ...</span>
        </div>
      </div>

      <div class="stepper-container">
        <div class="stepper-steps">
          <div class="stepper-line"></div>
          <div id="stepper-bar" class="stepper-progress-line"></div>
          <div id="step-node-payment" class="stepper-step"><div class="step-circle">1</div><div class="step-label" id="step-lbl-payment"></div></div>
          <div id="step-node-checkin" class="stepper-step"><div class="step-circle">2</div><div class="step-label" id="step-lbl-checkin"></div></div>
          <div id="step-node-codes" class="stepper-step"><div class="step-circle">3</div><div class="step-label" id="step-lbl-codes"></div></div>
          <div id="step-node-checkout" class="stepper-step"><div class="step-circle">4</div><div class="step-label" id="step-lbl-checkout"></div></div>
        </div>
      </div>

      <div style="padding: 0 20px;">
        <div id="dash-error-box" class="error-alert"></div>
      </div>

      <!-- KARTA PŁATNOŚCI -->
      <div class="card" id="card-payments">
        <div class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
          <span id="txt-payments-title"></span>
        </div>
        <div class="payment-row">
          <div class="payment-label"><span class="payment-name" id="txt-deposit-name"></span><span class="payment-deadline" id="txt-deposit-desc"></span></div>
          <div class="payment-value-status"><span class="payment-amount" id="val-deposit-amount">0.00 €</span><span id="badge-deposit-status" class="status-badge">...</span></div>
        </div>
        <div class="payment-row">
          <div class="payment-label"><span class="payment-name" id="txt-rest-name"></span><span class="payment-deadline" id="val-payment-deadline"></span></div>
          <div class="payment-value-status"><span class="payment-amount" id="val-rest-amount">0.00 €</span><span id="badge-rest-status" class="status-badge">...</span></div>
        </div>
        <div class="payment-row">
          <div class="payment-label"><span class="payment-name" id="txt-bond-name"></span><span class="payment-deadline" id="txt-bond-desc"></span></div>
          <div class="payment-value-status"><span class="payment-amount" id="val-bond-amount">0.00 €</span><span id="badge-bond-status" class="status-badge">...</span></div>
        </div>
        <div class="payment-progress-bar-container"><div id="payment-bar" class="payment-progress-bar-fill"></div></div>
        <div id="payment-progress-text" class="payment-progress-text"></div>
      </div>

      <!-- KARTA CHECK-IN -->
      <div class="card" id="card-checkin">
        <div class="card-title">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span id="txt-checkin-card-title"></span>
        </div>
        <div id="checkin-before-48h" class="checkin-info-box hidden">
          <p style="font-weight: 500; color: var(--ocean);" id="txt-checkin-not-yet-title"></p>
          <p style="margin-top: 6px; font-size: 12px; color: var(--muted);">
            <span id="txt-checkin-available-from"></span><br>
            <strong id="checkin-open-time" style="color: var(--text);">...</strong>
          </p>
        </div>
        <div id="checkin-payment-required" class="checkin-info-box warning-box hidden">
          <p style="font-weight: 500; color: var(--error);" id="txt-checkin-payment-required-title"></p>
          <p style="margin-top: 6px; font-size: 12px; color: var(--text); line-height: 1.4;" id="txt-checkin-payment-required-desc"></p>
        </div>
        <div id="checkin-completed-alert" class="success-alert hidden">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          <div><strong id="txt-checkin-done-title"></strong><br><span id="txt-checkin-done-desc"></span></div>
        </div>
        <div id="checkin-form-container" class="hidden">
          <p style="font-size: 13px; color: var(--muted); margin-bottom: 15px; line-height: 1.4;">
            <span id="txt-checkin-form-intro"></span> <strong id="checkin-people-count" style="color: var(--ocean);">1</strong>.
          </p>
          <div id="dynamic-guests-fields"></div>
          <button type="button" id="btn-submit-checkin" class="btn-apple" onclick="submitCheckInForm()">

    // ──── Stan globalny ────
    var currentReservation = null;
    var isPdfOpened = false;
    var selectedVideoBase64 = null;
    var selectedVideoFilename = null;
    var currentLang = 'pl';

    // ──── Helpers ────
    function t(key) {
      return (STRINGS[currentLang] && STRINGS[currentLang][key]) ? STRINGS[currentLang][key] : (STRINGS['pl'][key] || key);
    }

    function setLang(lang) {
      currentLang = lang;
      document.querySelectorAll('.lang-btn').forEach(function(btn) {
        btn.classList.toggle('active', btn.textContent.indexOf(lang.toUpperCase()) > -1);
      });
      applyTranslations();
    }

    // ══════════════════════════════════════════════════════
    // WYWOŁANIA GAS — zastępują google.script.run
    // GAS musi zwracać JSON z odpowiednim action i danymi
    // ══════════════════════════════════════════════════════

    /**
     * Wysyła żądanie GET do GAS z parametrami jako query string.
     * GAS doGet() musi obsługiwać parametr ?action=loginGuest&email=...&password=...
     */
    function gasGet(params) {
      if (GAS_URL === "WKLEJ_URL_GAS_TUTAJ") {
        document.getElementById('config-banner').style.display = 'block';
        return Promise.reject(new Error("Brak konfiguracji GAS_URL"));
      }
      var qs = Object.keys(params).map(function(k) {
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
      }).join('&');
      return fetch(GAS_URL + '?' + qs, { method: 'GET' })
        .then(function(r) { return r.json(); });
    }

    /**
     * Wysyła żądanie POST do GAS z danymi JSON w body.
     * GAS doPost() musi obsługiwać e.postData.contents jako JSON.
     */
    function gasPost(data) {
      if (GAS_URL === "WKLEJ_URL_GAS_TUTAJ") {
        document.getElementById('config-banner').style.display = 'block';
        return Promise.reject(new Error("Brak konfiguracji GAS_URL"));
      }
      return fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // text/plain omija preflight CORS
        body: JSON.stringify(data)
      }).then(function(r) { return r.json(); });
    }

    // ──── Inicjalizacja ────
    document.addEventListener("DOMContentLoaded", function() {
      applyTranslations();

      if (GAS_URL === "WKLEJ_URL_GAS_TUTAJ") {
        document.getElementById('config-banner').style.display = 'block';
      }

      var cached = localStorage.getItem("azzurro_reservation");
      var pdfOpenedCache = localStorage.getItem("azzurro_pdf_opened");
      if (pdfOpenedCache === "true") isPdfOpened = true;

      if (cached) {
        try {
          currentReservation = JSON.parse(cached);
          if (currentReservation.lang === 'EN') {
            currentLang = 'en';
            document.querySelectorAll('.lang-btn').forEach(function(btn) {
              btn.classList.toggle('active', btn.textContent.indexOf('EN') > -1);
            });
            applyTranslations();
          }
          showDashboard(currentReservation);
        } catch(e) {
          localStorage.removeItem("azzurro_reservation");
        }
      }
    });

    function showOverlay(key) {
      document.getElementById('txt-overlay-title').textContent = t('overlayTitle');
      document.getElementById("overlay-text").textContent = t(key) || key;
      document.getElementById("loading-overlay").style.display = "flex";
    }
    function hideOverlay() { document.getElementById("loading-overlay").style.display = "none"; }

    // ──── Login ────
    function handleLogin() {
      var email = document.getElementById("login-email").value.trim();
      var password = document.getElementById("login-password").value.trim();
      var errorBox = document.getElementById("login-error-box");

      if (!email || !password) {
        errorBox.textContent = t('loginErrorEmpty');
        errorBox.style.display = "flex";
        return;
      }

      errorBox.style.display = "none";
      document.getElementById("btn-login").disabled = true;
      document.getElementById("login-spinner").style.display = "block";

      gasGet({ action: 'loginGuest', email: email, password: password })
        .then(function(response) {
          document.getElementById("btn-login").disabled = false;
          document.getElementById("login-spinner").style.display = "none";

          if (response.success) {
            currentReservation = response.reservation;
            if (currentReservation.lang === 'EN') {
              currentLang = 'en';
              document.querySelectorAll('.lang-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.indexOf('EN') > -1);
              });
              applyTranslations();
            }
            localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
            showDashboard(currentReservation);
            tawkSetGuestData(currentReservation);
          } else {
            errorBox.textContent = response.message || t('loginErrorBad');
            errorBox.style.display = "flex";
          }
        })
        .catch(function(err) {
          document.getElementById("btn-login").disabled = false;
          document.getElementById("login-spinner").style.display = "none";
          errorBox.textContent = t('loginErrorConn') + (err.message || err);
          errorBox.style.display = "flex";
        });
    }

    // Obsługa Enter w formularzu logowania
    document.addEventListener("DOMContentLoaded", function() {
      ['login-email', 'login-password'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.addEventListener('keydown', function(e) { if (e.key === 'Enter') handleLogin(); });
      });
    });

    // ──── Logout ────
    function handleLogout() {
      localStorage.removeItem("azzurro_reservation");
      localStorage.removeItem("azzurro_pdf_opened");
      currentReservation = null;
      isPdfOpened = false;
      document.getElementById("login-email").value = "";
      document.getElementById("login-password").value = "";
      document.getElementById("login-error-box").style.display = "none";
      document.getElementById("dash-section").classList.add("hidden");
      document.getElementById("login-section").classList.remove("hidden");
      applyTranslations();
    }

    // ──── Dashboard ────
    function showDashboard(res) {
      document.getElementById("login-section").classList.add("hidden");
      document.getElementById("dash-section").classList.remove("hidden");
      applyTranslations();

      document.getElementById("guest-welcome").textContent = t('welcomePrefix') + res.fullName + "!";
      var datesStr = formatDateFriendly(res.dateFrom) + " – " + formatDateFriendly(res.dateTo) + " (" + res.nightsCount + " " + t('nights') + ")";
      document.getElementById("stay-dates").textContent = datesStr;

      document.getElementById("val-deposit-amount").textContent = res.depositAmount + " €";
      document.getElementById("val-rest-amount").textContent = res.restAmount + " €";
      document.getElementById("val-bond-amount").textContent = res.bondAmount + " €";
      document.getElementById("val-payment-deadline").textContent = t('deadlinePrefix') + res.paymentDeadline;

      setPaymentStatusBadge("badge-deposit-status", res.depositStatus);
      setPaymentStatusBadge("badge-rest-status", res.restStatus);
      setPaymentStatusBadge("badge-bond-status", res.bondStatus);

      var total = (parseFloat(res.depositAmount) || 0) + (parseFloat(res.restAmount) || 0) + (parseFloat(res.bondAmount) || 0);
      var paid = 0;
      var ds = (res.depositStatus || "").toLowerCase();
      var rs = (res.restStatus || "").toLowerCase();
      var bs = (res.bondStatus || "").toLowerCase();
      if (ds === "zapłacono" || ds === "paid") paid += parseFloat(res.depositAmount) || 0;
      if (rs === "zapłacono" || rs === "paid") paid += parseFloat(res.restAmount) || 0;
      if (bs === "zapłacono" || bs === "paid") paid += parseFloat(res.bondAmount) || 0;

      var pct = total > 0 ? Math.round((paid / total) * 100) : 0;
      document.getElementById("payment-bar").style.width = pct + "%";
      document.getElementById("payment-progress-text").textContent = t('progressText') + pct + "% (" + paid + t('progressOf') + total + " €)";

      refreshProgressStepper(res);
    }

    function formatDateFriendly(dateStr) {
      if (!dateStr) return "";
      var date = new Date(dateStr + "T00:00:00");
      if (currentLang === 'en') {
        var me = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
        return me[date.getMonth()] + " " + date.getDate() + ", " + date.getFullYear();
      }
      var mp = ["Sty","Lut","Mar","Kwi","Maj","Cze","Lip","Sie","Wrz","Paź","Lis","Gru"];
      return date.getDate() + " " + mp[date.getMonth()] + " " + date.getFullYear();
    }

    function setPaymentStatusBadge(id, status) {
      var badge = document.getElementById(id);
      var s = (status || "").toLowerCase();
      if (s === "zapłacono" || s === "paid") {
        badge.textContent = t('statusPaid'); badge.className = "status-badge paid";
      } else {
        badge.textContent = t('statusUnpaid'); badge.className = "status-badge unpaid";
      }
    }

    function isFullyPaid(res) {
      var ds = (res.depositStatus || "").toLowerCase();
      var rs = (res.restStatus || "").toLowerCase();
      var bs = (res.bondStatus || "").toLowerCase();
      return (ds === "zapłacono" || ds === "paid") && (rs === "zapłacono" || rs === "paid") && (bs === "zapłacono" || bs === "paid");
    }

    function refreshProgressStepper(res) {
      var nodes = ["step-node-payment","step-node-checkin","step-node-codes","step-node-checkout"];
      nodes.forEach(function(id) { document.getElementById(id).classList.remove("active","completed"); });

      var isPaymentDone = isFullyPaid(res);
      var isCheckinDone = res.isCheckedIn;
      var isCodesRevealed = isPdfOpened;
      var cos = (res.checkOutStatus || "").toLowerCase();
      var isCheckoutDone = (cos === "zakończono" || cos === "welcome_done");
      var bar = document.getElementById("stepper-bar");

      if (isCheckoutDone) {
        nodes.forEach(function(id) { document.getElementById(id).classList.add("completed"); });
        bar.style.width = "100%";
      } else if (isCodesRevealed) {
        ["step-node-payment","step-node-checkin","step-node-codes"].forEach(function(id) { document.getElementById(id).classList.add("completed"); });
        document.getElementById("step-node-checkout").classList.add("active");
        bar.style.width = "75%";
      } else if (isCheckinDone) {
        ["step-node-payment","step-node-checkin"].forEach(function(id) { document.getElementById(id).classList.add("completed"); });
        document.getElementById("step-node-codes").classList.add("active");
        bar.style.width = "50%";
      } else if (isPaymentDone) {
        document.getElementById("step-node-payment").classList.add("completed");
        document.getElementById("step-node-checkin").classList.add("active");
        bar.style.width = "25%";
      } else {
        document.getElementById("step-node-payment").classList.add("active");
        bar.style.width = "0%";
      }

      // Check-in karta
      var cfc = document.getElementById("checkin-form-container");
      var cca = document.getElementById("checkin-completed-alert");
      var cb48 = document.getElementById("checkin-before-48h");
      var cpr = document.getElementById("checkin-payment-required");
      [cfc, cca, cb48, cpr].forEach(function(el) { el.classList.add("hidden"); });

      if (isCheckinDone) {
        cca.classList.remove("hidden");
      } else {
        var arrivalDate = new Date(res.dateFrom + "T00:00:00");
        var now = new Date();
        var checkInOpenTime = new Date(arrivalDate.getTime() - 48 * 60 * 60 * 1000);
        if (now >= checkInOpenTime) {
          if (isPaymentDone) {
            cfc.classList.remove("hidden");
            document.getElementById("checkin-people-count").textContent = res.guestsCount;
            generateGuestsFields(res.guestsCount);
          } else {
            cpr.classList.remove("hidden");
          }
        } else {
          cb48.classList.remove("hidden");
          document.getElementById("checkin-open-time").textContent = formatDateTimeFull(checkInOpenTime);
        }
      }

      // Kody
      var cardCodes = document.getElementById("card-codes");
      var cpdf = document.getElementById("codes-pdf-section");
      var cpre = document.getElementById("codes-pre-pdf");
      var cdisp = document.getElementById("codes-display-container");
      cardCodes.classList.add("card-locked");
      [cpdf, cpre, cdisp].forEach(function(el) { el.classList.add("hidden"); });

      if (isCheckinDone) {
        cardCodes.classList.remove("card-locked");
        cpdf.classList.remove("hidden");
        if (isPdfOpened) { cdisp.classList.remove("hidden"); displayRoomCodes(res.room); }
        else { cpre.classList.remove("hidden"); }
      }

      // Checkout
      var cardCheckout = document.getElementById("card-checkout");
      var coAlert = document.getElementById("checkout-completed-alert");
      var coForm = document.getElementById("checkout-form-container");
      cardCheckout.classList.add("card-locked");
      coAlert.classList.add("hidden"); coForm.classList.add("hidden");

      if (isCheckinDone && isPdfOpened) {
        cardCheckout.classList.remove("card-locked");
        if (isCheckoutDone) { coAlert.classList.remove("hidden"); }
        else { coForm.classList.remove("hidden"); }
      }
    }

    function formatDateTimeFull(date) {
      if (currentLang === 'en') {
        return date.toLocaleDateString('en-GB', {day:'numeric',month:'long',year:'numeric'}) + " at " + date.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
      }
      return date.toLocaleDateString('pl-PL', {day:'numeric',month:'long',year:'numeric'}) + ", godz. " + date.toLocaleTimeString('pl-PL',{hour:'2-digit',minute:'2-digit'});
    }

    function generateGuestsFields(count) {
      var container = document.getElementById("dynamic-guests-fields");
      container.innerHTML = "";
      for (var i = 1; i <= count; i++) {
        var guestTitle = t('guestLabel') + ' ' + i + ' ' + (i === 1 ? t('mainGuest') : '');
        container.insertAdjacentHTML('beforeend',
          '<div class="guest-form-card">' +
          '<div class="guest-form-title">' + guestTitle + '</div>' +
          '<div class="input-group"><label class="input-label">' + t('fldName') + '</label>' +
          '<input type="text" id="guest-name-' + i + '" class="input-control" placeholder="' + t('fldNamePh') + '" required></div>' +
          '<div class="input-group"><label class="input-label">' + t('fldPassport') + '</label>' +
          '<input type="text" id="guest-passport-' + i + '" class="input-control" placeholder="' + t('fldPassportPh') + '" required></div>' +
          '<div class="input-group" style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">' +
          '<div><label class="input-label">' + t('fldDob') + '</label>' +
          '<input type="date" id="guest-dob-' + i + '" class="input-control" required></div>' +
          '<div><label class="input-label">' + t('fldNationality') + '</label>' +
          '<input type="text" id="guest-nationality-' + i + '" class="input-control" placeholder="' + t('fldNationalityPh') + '" value="' + t('fldNationalityDefault') + '" required></div>' +
          '</div></div>'
        );
      }
      if (currentReservation) {
        var n1 = document.getElementById("guest-name-1");
        if (n1) n1.value = currentReservation.fullName;
      }
    }

    // ──── Submit Check-in ────
    function submitCheckInForm() {
      if (!currentReservation) return;
      if (!isFullyPaid(currentReservation)) {
        alert(currentLang === 'en'
          ? "Check-in is not yet available. Please complete all payments first."
          : "Zameldowanie nie jest jeszcze dostępne. Najpierw należy uregulować wszystkie płatności.");
        return;
      }

      var count = currentReservation.guestsCount;
      var guests = [];
      for (var i = 1; i <= count; i++) {
        var name = document.getElementById("guest-name-" + i).value.trim();
        var passport = document.getElementById("guest-passport-" + i).value.trim();
        var dob = document.getElementById("guest-dob-" + i).value;
        var nationality = document.getElementById("guest-nationality-" + i).value.trim();
        if (!name || !passport || !dob || !nationality) { alert(t('alertFormEmpty')); return; }
        guests.push({ name: name, passport: passport, dob: dob, nationality: nationality });
      }

      showOverlay('overlayCheckin');

      gasPost({ action: 'submitCheckIn', reservationId: currentReservation.lp, guests: guests })
        .then(function(response) {
          hideOverlay();
          if (response.success) {
            currentReservation.isCheckedIn = true;
            localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
            showDashboard(currentReservation);
            setTimeout(function() { document.getElementById("card-codes").scrollIntoView({ behavior: 'smooth' }); }, 400);
          } else {
            alert("Błąd zameldowania: " + response.message);
          }
        })
        .catch(function(err) {
          hideOverlay();
          alert(t('checkinErrorConn') + (err.message || err));
        });
    }

    // ──── PDF modal ────
    function handlePdfOpenClick() {
      var modal = document.getElementById("pdf-modal");
      document.getElementById("pdf-iframe").src = (currentLang === 'en') ? PDF_EN : PDF_PL;
      modal.style.display = "flex";
      if (!isPdfOpened) {
        isPdfOpened = true;
        localStorage.setItem("azzurro_pdf_opened", "true");
        refreshProgressStepper(currentReservation);
      }
    }

    function closePdfModal() {
      document.getElementById("pdf-modal").style.display = "none";
      document.getElementById("pdf-iframe").src = "";
      setTimeout(function() {
        var el = document.getElementById("codes-display-container");
        if (el && !el.classList.contains("hidden")) el.scrollIntoView({ behavior: 'smooth' });
      }, 300);
    }

    function displayRoomCodes(roomStr) {
      var container = document.getElementById("rooms-codes-list");
      container.innerHTML = "";
      if (!roomStr) return;
      var uniqueRooms = {};
      var match, regex = /[123]/g;
      while ((match = regex.exec(roomStr.toString())) !== null) uniqueRooms[match[0]] = true;
      var roomsFound = Object.keys(uniqueRooms).sort();
      if (roomsFound.length === 0) {
        container.innerHTML = '<p style="font-size:13px;color:var(--error);">' + t('noRoomsError') + '</p>';
        return;
      }
      roomsFound.forEach(function(roomNum) {
        var d = ROOM_CODES_MAP[roomNum];
        if (!d) return;
        var desc = (currentLang === 'en') ? d.desc_en : d.desc_pl;
        container.insertAdjacentHTML('beforeend',
          '<div class="apt-code-card active-card">' +
          '<div class="apt-code-header"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>' +
          '<span>' + t('apt') + ' ' + roomNum + '</span></div>' +
          '<div class="code-row"><div class="code-label">🔑 ' + t('codeEntrance') + '</div><div class="code-value">' + d.door + '</div></div>' +
          '<div class="code-row"><div class="code-label">🔐 ' + t('codeBox') + '</div><div class="code-value">' + d.box + '</div></div>' +
          '<div class="code-instruction">' + desc + '</div></div>'
        );
      });
    }

    // ──── Video checkout ────
    function triggerVideoFileInput() { document.getElementById("checkout-video-input").click(); }

    function handleVideoFileSelection() {
      var fileInput = document.getElementById("checkout-video-input");
      var uploadText = document.getElementById("upload-box-text");
      var fileNameDiv = document.getElementById("selected-file-name");
      var btnSubmit = document.getElementById("btn-submit-checkout");

      if (fileInput.files.length === 0) {
        selectedVideoBase64 = null; selectedVideoFilename = null;
        uploadText.textContent = t('uploadBoxText'); fileNameDiv.style.display = "none"; btnSubmit.disabled = true; return;
      }

      var file = fileInput.files[0];
      if (file.size > 30 * 1024 * 1024) {
        alert(t('fileTooLarge').replace('{SIZE}', (file.size/(1024*1024)).toFixed(1)));
        fileInput.value = ""; selectedVideoBase64 = null; selectedVideoFilename = null;
        uploadText.textContent = t('uploadBoxText'); fileNameDiv.style.display = "none"; btnSubmit.disabled = true; return;
      }

      uploadText.textContent = t('fileChanged');
      fileNameDiv.textContent = t('fileSelected') + file.name + " (" + (file.size/(1024*1024)).toFixed(2) + " MB)";
      fileNameDiv.style.display = "block";

      var reader = new FileReader();
      reader.onload = function(e) {
        selectedVideoBase64 = e.target.result.split(',')[1];
        selectedVideoFilename = file.name;
        btnSubmit.disabled = false;
      };
      reader.readAsDataURL(file);
    }

    function submitCheckOut() {
      if (!currentReservation || !selectedVideoBase64 || !selectedVideoFilename) return;
      showOverlay('overlayCheckout');

      gasPost({ action: 'uploadCheckOutVideo', reservationId: currentReservation.lp, base64Data: selectedVideoBase64, filename: selectedVideoFilename })
        .then(function(response) {
          hideOverlay();
          if (response.success) {
            currentReservation.checkOutStatus = "WELCOME_DONE";
            localStorage.setItem("azzurro_reservation", JSON.stringify(currentReservation));
            showDashboard(currentReservation);
            alert(currentLang === 'en' ? "Check-out completed successfully. Thank you!" : "Wymeldowanie zakończone pomyślnie. Dziękujemy!");
          } else {
            alert("Błąd wymeldowania: " + response.message);
          }
        })
        .catch(function(err) {
          hideOverlay();
          alert(t('checkoutErrorConn') + (err.message || err));
        });
    }

    // ──── applyTranslations ────
    function applyTranslations() {
      var map = {
        'txt-login-intro': 'loginIntro', 'lbl-email': 'lblEmail', 'lbl-password': 'lblPassword',
        'txt-password-hint': 'passwordHint', 'txt-btn-login': 'btnLogin', 'txt-logout': 'logout',
        'txt-dash-subtitle': 'dashSubtitle', 'step-lbl-payment': 'stepPayment',
        'step-lbl-checkin': 'stepCheckin', 'step-lbl-codes': 'stepCodes', 'step-lbl-checkout': 'stepCheckout',
        'txt-payments-title': 'paymentsTitle', 'txt-deposit-name': 'depositName', 'txt-deposit-desc': 'depositDesc',
        'txt-rest-name': 'restName', 'txt-bond-name': 'bondName', 'txt-bond-desc': 'bondDesc',
        'txt-checkin-card-title': 'checkinCardTitle', 'txt-checkin-not-yet-title': 'checkinNotYetTitle',
        'txt-checkin-available-from': 'checkinAvailableFrom',
        'txt-checkin-payment-required-title': 'checkinPaymentRequiredTitle',
        'txt-checkin-payment-required-desc': 'checkinPaymentRequiredDesc',
        'txt-checkin-done-title': 'checkinDoneTitle', 'txt-checkin-done-desc': 'checkinDoneDesc',
        'txt-checkin-form-intro': 'checkinFormIntro', 'txt-btn-checkin': 'btnCheckin',
        'txt-codes-card-title': 'codesCardTitle', 'txt-btn-pdf': 'btnPdf',
        'txt-codes-pre-pdf-title': 'codesPrePdfTitle', 'txt-codes-pre-pdf-desc': 'codesPrePdfDesc',
        'txt-codes-unlocked': 'codesUnlocked', 'txt-checkout-card-title': 'checkoutCardTitle',
        'txt-checkout-done-title': 'checkoutDoneTitle', 'txt-checkout-done-desc': 'checkoutDoneDesc',
        'txt-checkout-intro': 'checkoutIntro', 'txt-upload-subtext': 'uploadSubtext',
        'txt-btn-checkout': 'btnCheckout', 'txt-overlay-title': 'overlayTitle',
        'txt-pdf-modal-title': 'pdfModalTitle', 'txt-pdf-close-btn': 'pdfClose'
      };
      Object.keys(map).forEach(function(id) {
        var el = document.getElementById(id);
        if (el) el.textContent = t(map[id]);
      });

      var loginEmail = document.getElementById('login-email');
      if (loginEmail) loginEmail.placeholder = t('emailPlaceholder');
      var loginPw = document.getElementById('login-password');
      if (loginPw) loginPw.placeholder = t('passwordPlaceholder');

      var uploadBoxEl = document.getElementById("upload-box-text");
      if (uploadBoxEl && uploadBoxEl.textContent !== t('fileChanged')) uploadBoxEl.textContent = t('uploadBoxText');
    }
  </script>

  // Po zalogowaniu gościa — przekaż jego dane do Tawk.to
  // Tawk_API może załadować się asynchronicznie, dlatego używamy onLoad
  function tawkSetGuestData(res) {
    function setData() {
      try {
        Tawk_API.setAttributes({
          name:  res.fullName,
          email: res.email,
          'Rezerwacja': String(res.lp),
          'Przyjazd':   res.dateFrom,
          'Wyjazd':     res.dateTo,
          'Apartament': String(res.room)
        }, function(err) { if(err) console.warn('Tawk setAttributes:', err); });
      } catch(e) {}
    }
    if (typeof Tawk_API !== 'undefined' && typeof Tawk_API.setAttributes === 'function') {
      setData();
    } else {
      Tawk_API = Tawk_API || {};
      var _prev = Tawk_API.onLoad;
      Tawk_API.onLoad = function() { if(_prev) _prev(); setData(); };
    }
  }
